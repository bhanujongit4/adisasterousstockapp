version: '3.9'
services:
  stock-intelligence:
    image: python:3.11-slim
    container_name: stock-intelligence
    working_dir: /app
    volumes:
      - ./services/stock-intelligence:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
